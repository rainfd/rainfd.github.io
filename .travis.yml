sudo: false
language: node_js
node_js:
  - 10 # use nodejs v10 LTS
cache: npm
branches:
  only:
    - source # build master branch only
script:
  - hexo clean
  - hexo generate # generate static files
  - hexo algolia  
deploy:
  - provider: pages
    skip-cleanup: true
    github-token: $GH_TOKEN
    keep-history: true
    on:
      branch: source
    target_branch: master
    local-dir: public
  - provider: heroku
    api_key:
      secure: $HEROKU_API_KEY
    app: rainfd
    on: source
